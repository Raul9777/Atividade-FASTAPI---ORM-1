<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Produtos</title>
    <style>
        body { font-family: sans-serif; margin: 40px; }
        .card { border: 1px solid #ccc; padding: 15px; background: #fafafa; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; }
        .estoque-baixo { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <a href="/">⬅ Voltar</a>
    <h1>Produtos</h1>

    <div class="card">
        <h3>Cadastrar Novo Produto</h3>
        <form action="/produtos/novo" method="post">
            <input type="text" name="nome" placeholder="Nome do Produto" required>
            <input type="number" step="0.01" name="preco" placeholder="Preço (ex: 99.90)" required>
            <input type="number" name="estoque" placeholder="Qtd em Estoque" required>
            
            <select name="categoria_id" required>
                <option value="">Selecione uma Categoria</option>
                {% for cat in categorias %}
                <option value="{{ cat.id }}">{{ cat.nome }}</option>
                {% endfor %}
            </select>
            
            <button type="submit">Salvar Produto</button>
        </form>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Produto</th>
                <th>Preço</th>
                <th>Estoque</th>
                <th>Categoria</th>
            </tr>
        </thead>
        <tbody>
            {% for prod in produtos %}
            <tr>
                <td>{{ prod.id }}</td>
                <td>{{ prod.nome }}</td>
                <td>R$ {{ "%.2f"|format(prod.preco) }}</td>
                <td class="{{ 'estoque-baixo' if prod.estoque < 5 }}">{{ prod.estoque }}</td>
                <td>{{ prod.categoria.nome }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
